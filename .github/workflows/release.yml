name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the annotated tag message is available for the release body.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Prepare release artifacts and notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          # One APK per ABI split; rename each to C2PAVerify-<version>-<abi>.apk.
          shopt -s nullglob
          apks=(app/build/outputs/apk/release/*.apk)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "No release APK found" >&2
            exit 1
          fi
          for apk in "${apks[@]}"; do
            abi=$(basename "$apk" | sed -E 's/^app-(.+)-release\.apk$/\1/')
            cp "$apk" "dist/C2PAVerify-${version}-${abi}.apk"
          done
          # Use the annotated tag's message body as the release notes.
          git tag -l --format='%(contents)' "$GITHUB_REF_NAME" > release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*.apk

  publish-play-store:
    name: Build & Publish to Google Play
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Ruby & fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # Play requires the AAB signed with the registered upload key (the Play-managed keystore),
      # which differs from the key used for the directly-distributed GitHub/IzzyOnDroid APKs.
      - name: Decode Play upload keystore
        env:
          PLAY_KEYSTORE_BASE64: ${{ secrets.PLAY_KEYSTORE_BASE64 }}
        run: echo "$PLAY_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.keystore"

      - name: Decode Play Store service account key
        env:
          PLAY_STORE_CONFIG_BASE64: ${{ secrets.PLAY_STORE_CONFIG_BASE64 }}
        run: echo "$PLAY_STORE_CONFIG_BASE64" | base64 --decode > play-store-config.json

      - name: Build bundle & upload to Play Store
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/upload.keystore
          KEYSTORE_PASSWORD: ${{ secrets.PLAY_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.PLAY_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.PLAY_KEY_PASSWORD }}
        run: bundle exec fastlane deploy
